<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}the feather test{% endblock %}</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <a href="https://kwasikontor.dev" target="_blank" rel="noopener noreferrer" style="display:flex;align-items:center;flex-shrink:0;">
      <img src="https://kontor.studio/butterfly-dna.gif" alt="Kwasi M. Kontor" style="width:32px;height:32px;border-radius:50%;display:block;filter:drop-shadow(0 0 8px rgba(200,245,99,0.2));" />
    </a>
    <a href="/" class="site-logo">🪶 the feather test</a>
    <nav>
      <a href="/join">join game</a>
      <a href="/leaderboard">leaderboard</a>
    </nav>
  </header>

  <main class="site-main">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
